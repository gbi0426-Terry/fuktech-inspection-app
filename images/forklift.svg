<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#37474f"/>
      <stop offset="1" stop-color="#1c2531"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#sky)"/>
  <rect x="0" y="170" width="400" height="70" fill="#22282f"/>
  <rect x="0" y="178" width="400" height="4" fill="#3c4753"/>
  <g opacity="0.5">
    <rect x="20" y="40" width="60" height="120" fill="#2c3640"/>
    <rect x="100" y="60" width="50" height="100" fill="#2c3640"/>
    <rect x="300" y="50" width="70" height="110" fill="#2c3640"/>
  </g>
  <!-- forklift body -->
