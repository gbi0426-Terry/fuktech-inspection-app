    <rect x="150" y="150" width="90" height="38" rx="4" fill="#f9a825"/>
    <rect x="150" y="150" width="90" height="10" fill="#fbc02d"/>
    <rect x="160" y="118" width="14" height="36" fill="#fdd835"/>
    <rect x="222" y="118" width="14" height="36" fill="#fdd835"/>
    <rect x="160" y="112" width="76" height="10" fill="#fdd835"/>
    <circle cx="168" cy="192" r="14" fill="#212121"/>
    <circle cx="168" cy="192" r="6" fill="#616161"/>
    <circle cx="222" cy="192" r="14" fill="#212121"/>
    <circle cx="222" cy="192" r="6" fill="#616161"/>
    <!-- forks -->
    <rect x="236" y="150" width="40" height="6" fill="#9e9e9e"/>
    <rect x="236" y="168" width="40" height="6" fill="#9e9e9e"/>
    <rect x="230" y="115" width="8" height="78" fill="#757575"/>
    <!-- pallet load -->
    <rect x="240" y="120" width="34" height="30" fill="#8d6e63"/>
    <rect x="240" y="120" width="34" height="6" fill="#a1887f"/>
  </g>
  <rect x="0" y="220" width="400" height="20" fill="#10141a"/>
