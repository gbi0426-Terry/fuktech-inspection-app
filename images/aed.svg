<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="sky4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#37474f"/>
      <stop offset="1" stop-color="#1c2531"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#sky4)"/>
  <rect x="0" y="195" width="400" height="45" fill="#22282f"/>
  <!-- wall cabinet -->
  <rect x="150" y="40" width="100" height="120" rx="6" fill="#eceff1"/>
  <rect x="150" y="40" width="100" height="120" rx="6" fill="none" stroke="#b0bec5" stroke-width="3"/>
  <rect x="160" y="50" width="80" height="60" rx="4" fill="#ffffff"/>
  <!-- AED heart/lightning icon -->
  <path d="M200 60 l-10 18 h8 l-6 16 18-20 h-8 z" fill="#43a047"/>
  <text x="200" y="100" font-size="11" fill="#43a047" text-anchor="middle" font-family="Arial" font-weight="bold">AED</text>
  <!-- handle -->
  <rect x="236" y="95" width="8" height="20" rx="3" fill="#90a4ae"/>
  <!-- red cross sign above -->
  <rect x="185" y="20" width="30" height="30" rx="4" fill="#e53935"/>
  <rect x="195" y="26" width="10" height="18" fill="#fff"/>
  <rect x="189" y="32" width="22" height="6" fill="#fff"/>
  <!-- floor shadow -->
  <ellipse cx="200" cy="170" rx="60" ry="8" fill="#10141a" opacity="0.4"/>
  <rect x="0" y="220" width="400" height="20" fill="#10141a"/>
</svg>
